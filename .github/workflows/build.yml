name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npx cap sync android
      - name: Fix Java version
        run: |
          find android -name "*.gradle" | xargs grep -l "VERSION_21" | xargs sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g'
          find $HOME/.gradle -name "*.gradle" 2>/dev/null | xargs grep -l "VERSION_21" 2>/dev/null | xargs sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' || true
          find ~/.npm -name "*.gradle" 2>/dev/null | xargs grep -l "VERSION_21" 2>/dev/null | xargs sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' || true
      - name: Build APK
        run: cd android && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
