name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npx cap sync android
      - name: Force Java 17
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          find android -name "*.gradle" | xargs sed -i 's/VERSION_21/VERSION_17/g'
          find android/node_modules -name "*.gradle" 2>/dev/null | xargs sed -i 's/VERSION_21/VERSION_17/g' || true
      - name: Build APK
        run: cd android && ./gradlew assembleDebug -Porg.gradle.java.version=17
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
